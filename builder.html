<body class="bg-background dark:bg-gray-950 font-body-md text-on-background dark:text-gray-100 h-screen flex flex-col overflow-hidden transition-colors duration-300">
<!-- TopNavBar Implementation -->
<header class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 docked full-width top-0 sticky z-50 shadow-sm">
<div class="flex justify-between items-center h-16 px-6 max-w-[1440px] mx-auto">
<div class="flex items-center gap-4">
<a href="dashboard.html" class="text-xl font-bold tracking-tight text-indigo-600 dark:text-indigo-400 cursor-pointer">ResumeCraft</a>
<div class="h-6 w-px bg-outline-variant mx-2"></div>
<h1 class="font-h3 text-h3 text-on-surface dark:text-white">Modern Professional Template</h1>
</div>
<div class="flex items-center gap-3">
<button onclick="window.location.href='dashboard.html'" class="px-4 py-2 text-label-md font-label-md text-on-surface-variant dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-200 rounded-lg">
                    Exit
                </button>
<button id="save-draft-btn" onclick="saveResume()" class="px-5 py-2.5 bg-primary-container text-white font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 transition-opacity flex items-center gap-2">
    <span class="material-symbols-outlined text-[18px]">save</span>
    <span id="save-btn-text">Save Draft</span>
</button>
</div>
</div>
</header>
<!-- Main Workspace -->
<main class="flex flex-1 overflow-hidden">
<!-- Left Column: Editor (40%) -->
<section class="w-[40%] min-w-[480px] bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col h-full overflow-hidden">

<!-- Form Area -->
<div class="flex-1 overflow-y-auto px-8 py-10 space-y-10">
<div class="space-y-2">
<h2 class="font-h2 text-h2 text-on-surface dark:text-white">Personal Information</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant dark:text-gray-400">Start with your basic details to help employers contact you.</p>
</div>
<div class="grid grid-cols-2 gap-6">
<div class="col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200">Full Name</label>
<input id="fullName" oninput="handlePersonalInfoChange('fullName', event)" class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-gray-700 bg-white dark:bg-gray-800 text-on-surface dark:text-white focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 outline-none transition-all text-body-md" placeholder="e.g. Alex Carter" type="text" value=""/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200">Email Address</label>
<input id="email" oninput="handlePersonalInfoChange('email', event)" class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-gray-700 bg-white dark:bg-gray-800 text-on-surface dark:text-white focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 outline-none transition-all text-body-md" placeholder="alex@example.com" type="email" value=""/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200">Phone Number</label>
<input id="phone" oninput="handlePersonalInfoChange('phone', event)" class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-gray-700 bg-white dark:bg-gray-800 text-on-surface dark:text-white focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 outline-none transition-all text-body-md" placeholder="+1 (555) 000-0000" type="tel" value=""/>
</div>
<div class="col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200">Address / Location</label>
<input id="location" oninput="handlePersonalInfoChange('location', event)" class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-gray-700 bg-white dark:bg-gray-800 text-on-surface dark:text-white focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 outline-none transition-all text-body-md" placeholder="San Francisco, CA" type="text" value=""/>
</div>
<div class="col-span-2 space-y-2">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200">Professional Summary</label>
<textarea id="summary" oninput="handlePersonalInfoChange('summary', event)" class="w-full p-4 rounded-lg border border-outline-variant dark:border-gray-700 bg-white dark:bg-gray-800 text-on-surface dark:text-white focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 outline-none transition-all text-body-md resize-none" placeholder="Briefly describe your expertise and career goals..." rows="5"></textarea>
</div>
</div>
<!-- Dynamic Sections -->
<div class="space-y-12">
    <!-- Experience -->
    <div class="space-y-4">
        <h2 class="font-h2 text-h2 text-on-surface dark:text-white pb-2 border-b border-gray-100 dark:border-gray-800">Experience</h2>
        <div id="experienceList" class="space-y-6"></div>
        <button onclick="addExperienceBlock()" class="flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-outline-variant dark:border-gray-700 rounded-xl text-on-surface-variant dark:text-gray-400 hover:border-primary-container dark:hover:border-indigo-400 hover:text-primary-container dark:hover:text-indigo-400 hover:bg-surface-container-low dark:hover:bg-indigo-900/10 transition-all group">
            <span class="material-symbols-outlined text-[20px]">add_circle</span>
            <span class="font-label-md text-label-md">Add Experience</span>
        </button>
    </div>

    <!-- Education -->
    <div class="space-y-4">
        <h2 class="font-h2 text-h2 text-on-surface dark:text-white pb-2 border-b border-gray-100 dark:border-gray-800">Education</h2>
        <div id="educationList" class="space-y-6"></div>
        <button onclick="addEducationBlock()" class="flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-outline-variant rounded-xl text-on-surface-variant hover:border-primary-container hover:text-primary-container hover:bg-surface-container-low transition-all group">
            <span class="material-symbols-outlined text-[20px]">add_circle</span>
            <span class="font-label-md text-label-md">Add Education</span>
        </button>
    </div>

    <!-- Skills -->
    <div class="space-y-4">
        <h2 class="font-h2 text-h2 text-on-surface dark:text-white pb-2 border-b border-gray-100 dark:border-gray-800">Skills</h2>
        <div id="skillsList" class="space-y-6"></div>
        <button onclick="addSkillBlock()" class="flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-outline-variant rounded-xl text-on-surface-variant hover:border-primary-container hover:text-primary-container hover:bg-surface-container-low transition-all group">
            <span class="material-symbols-outlined text-[20px]">add_circle</span>
            <span class="font-label-md text-label-md">Add Skill</span>
        </button>
    </div>

    <!-- Projects -->
    <div class="space-y-4">
        <h2 class="font-h2 text-h2 text-on-surface dark:text-white pb-2 border-b border-gray-100 dark:border-gray-800">Projects</h2>
        <div id="projectsList" class="space-y-6"></div>
        <button onclick="addProjectBlock()" class="flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-outline-variant rounded-xl text-on-surface-variant hover:border-primary-container hover:text-primary-container hover:bg-surface-container-low transition-all group">
            <span class="material-symbols-outlined text-[20px]">add_circle</span>
            <span class="font-label-md text-label-md">Add Project</span>
        </button>
    </div>
</div>
</div>
<!-- Editor Footer -->
<div class="p-6 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 flex justify-between">
<button onclick="window.location.href='dashboard.html'" class="flex items-center gap-2 px-6 py-3 text-label-md font-label-md text-on-surface-variant dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back
                </button>
<button onclick="handleNextStep()" class="flex items-center gap-2 px-10 py-3 bg-primary-container text-white text-label-md font-label-md rounded-lg shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all">
                    Next Step

</button>
</div>
</section>
<!-- Right Column: Live Preview (60%) -->
<section class="flex-1 bg-surface-container-low dark:bg-gray-950 flex flex-col items-center overflow-hidden relative">
<!-- Preview Controls -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-white dark:bg-gray-800 px-4 py-2 rounded-full shadow-md border border-gray-200 dark:border-gray-700 z-10">
<div class="flex items-center border-r border-gray-100 dark:border-gray-700 pr-4 mr-2">
<button class="p-2 hover:bg-surface-container dark:hover:bg-gray-700 rounded-full text-on-surface-variant dark:text-gray-400" title="Zoom Out">
<span class="material-symbols-outlined text-[20px]">zoom_out</span>
</button>
<span class="px-2 text-label-sm font-label-sm text-on-surface dark:text-white">100%</span>
<button class="p-2 hover:bg-surface-container dark:hover:bg-gray-700 rounded-full text-on-surface-variant dark:text-gray-400" title="Zoom In">
<span class="material-symbols-outlined text-[20px]">zoom_in</span>
</button>
</div>
<div class="flex bg-gray-100 dark:bg-gray-900 p-1 rounded-lg">
    <button id="desktop-toggle" onclick="setPreviewSize('desktop')" class="px-3 py-1 bg-white dark:bg-gray-800 text-primary dark:text-indigo-400 shadow-sm rounded-md text-label-sm font-label-sm flex items-center gap-2 transition-all">
        <span class="material-symbols-outlined text-[16px]">desktop_windows</span>
        Desktop
    </button>
    <button id="mobile-toggle" onclick="setPreviewSize('mobile')" class="px-3 py-1 text-on-surface-variant dark:text-gray-400 rounded-md text-label-sm font-label-sm flex items-center gap-2 transition-all">
        <span class="material-symbols-outlined text-[16px]">smartphone</span>
        Mobile
    </button>
</div>
</div>
<!-- Resume Canvas Container -->
<div class="flex-grow w-full overflow-y-auto p-8 flex justify-center bg-gray-100 dark:bg-gray-950">
    <div id="resume-preview" class="@container bg-white shadow-2xl w-[210mm] min-h-[297mm] h-fit origin-top transform transition-all duration-300">
        <!-- Template content will be injected here -->
    </div>
</div>
</section>
</main>
<!-- Contextual FAB Suppression: FAB only on relevant builder home, suppressed here per instructions -->
</body>
<script>
    let resumeId = null;
    let resumeData = {
        experience: [],
        education: [],
        skills: [],
        projects: []
    };

    document.addEventListener('DOMContentLoaded', async () => {
        if (!checkAuth()) return;
        const urlParams = new URLSearchParams(window.location.search);
        resumeId = urlParams.get('id');

        if (!resumeId) {
            alert('No Resume ID specified. Redirecting to dashboard.');
            window.location.href = 'dashboard.html';
            return;
        }

        try {
            const resume = await fetchAPI('/resumes/' + resumeId);
            
            // Populate personal form
            document.getElementById('fullName').value = resume.personalInfo?.fullName || '';
            document.getElementById('email').value = resume.personalInfo?.email || '';
            document.getElementById('phone').value = resume.personalInfo?.phone || '';
            document.getElementById('location').value = resume.personalInfo?.location || '';
            document.getElementById('summary').value = resume.personalInfo?.summary || '';

            // Load dynamic arrays
            resumeData.experience = resume.experience || [];
            resumeData.education = resume.education || [];
            resumeData.skills = resume.skills || [];
            resumeData.projects = resume.projects || [];
            resumeData.templateId = resume.templateId;

            renderAllEditors();
            updatePreview();
        } catch (error) {
            console.error('Error fetching resume:', error);
            alert('Error fetching resume details: ' + (error.message || 'Unknown error'));
        }

        // Add Live Preview Listeners for Personal Info
        const inputs = ['fullName', 'email', 'phone', 'location', 'summary'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });
    });

    // --- State Management & DOM Rendering for Left Panel ---
    function renderAllEditors() {
        renderEditorList('experience', resumeData.experience, createExperienceForm);
        renderEditorList('education', resumeData.education, createEducationForm);
        renderEditorList('skills', resumeData.skills, createSkillForm);
        renderEditorList('projects', resumeData.projects, createProjectForm);
    }

    function renderEditorList(type, dataArray, formBuilderFn) {
        const container = document.getElementById(type + 'List');
        container.innerHTML = '';
        dataArray.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = 'p-4 border border-gray-200 dark:border-gray-700 rounded-lg bg-surface dark:bg-gray-800 relative group space-y-4';
            
            const removeBtn = document.createElement('button');
            removeBtn.innerHTML = '<span class="material-symbols-outlined text-sm">delete</span>';
            removeBtn.className = 'absolute top-2 right-2 p-1 text-gray-400 hover:text-error transition-colors rounded';
            removeBtn.onclick = () => {
                resumeData[type].splice(index, 1);
                renderAllEditors();
                updatePreview();
            };
            
            block.appendChild(removeBtn);
            block.appendChild(formBuilderFn(item, index));
            container.appendChild(block);
        });
    }

    function handleFieldChange(type, index, field, event) {
        resumeData[type][index][field] = event.target.value;
        updatePreview();
    }

    function handlePersonalInfoChange(field, event) {
        if (!resumeData.personalInfo) resumeData.personalInfo = {};
        resumeData.personalInfo[field] = event.target.value;
        updatePreview();
    }

    // Input Generators
    function createInput(label, value, type, index, field) {
        const wrapper = document.createElement('div');
        wrapper.className = 'space-y-1';
        wrapper.innerHTML = `<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-gray-400">${label}</label>
            <input class="w-full h-10 px-3 rounded border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-on-surface dark:text-white text-sm focus:border-primary-container outline-none" value="${value || ''}">`;
        wrapper.querySelector('input').addEventListener('input', (e) => handleFieldChange(type, index, field, e));
        return wrapper;
    }
    function createTextArea(label, value, type, index, field) {
        const wrapper = document.createElement('div');
        wrapper.className = 'space-y-1 col-span-2';
        wrapper.innerHTML = `<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-gray-400">${label}</label>
            <textarea class="w-full p-3 rounded border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-on-surface dark:text-white text-sm focus:border-primary-container outline-none resize-none" rows="3">${value || ''}</textarea>`;
        wrapper.querySelector('textarea').addEventListener('input', (e) => handleFieldChange(type, index, field, e));
        return wrapper;
    }

    // Form Builders
    function createExperienceForm(item, index) {
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 gap-4 mt-2';
        grid.appendChild(createInput('Job Title', item.title, 'experience', index, 'title'));
        grid.appendChild(createInput('Company', item.company, 'experience', index, 'company'));
        grid.appendChild(createInput('Start Date', item.startDate, 'experience', index, 'startDate'));
        grid.appendChild(createInput('End Date', item.endDate, 'experience', index, 'endDate'));
        grid.appendChild(createTextArea('Description', item.description, 'experience', index, 'description'));
        return grid;
    }

    function createEducationForm(item, index) {
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 gap-4 mt-2';
        grid.appendChild(createInput('Degree', item.degree, 'education', index, 'degree'));
        grid.appendChild(createInput('School', item.school, 'education', index, 'school'));
        grid.appendChild(createInput('Start Year', item.startYear, 'education', index, 'startYear'));
        grid.appendChild(createInput('End Year', item.endYear, 'education', index, 'endYear'));
        grid.appendChild(createTextArea('Description', item.description, 'education', index, 'description'));
        return grid;
    }

    function createSkillForm(item, index) {
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 gap-4 mt-2';
        grid.appendChild(createInput('Skill Name', item.name, 'skills', index, 'name'));
        grid.appendChild(createInput('Level', item.level, 'skills', index, 'level'));
        return grid;
    }

    function createProjectForm(item, index) {
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 gap-4 mt-2';
        grid.appendChild(createInput('Project Name', item.name, 'projects', index, 'name'));
        grid.appendChild(createInput('Link', item.link, 'projects', index, 'link'));
        grid.appendChild(createTextArea('Description', item.description, 'projects', index, 'description'));
        return grid;
    }

    // Adding Items
    function addExperienceBlock() { resumeData.experience.push({}); renderAllEditors(); updatePreview(); }
    function addEducationBlock() { resumeData.education.push({}); renderAllEditors(); updatePreview(); }
    function addSkillBlock() { resumeData.skills.push({}); renderAllEditors(); updatePreview(); }
    function addProjectBlock() { resumeData.projects.push({}); renderAllEditors(); updatePreview(); }

    // --- Right Panel Preview Rendering ---
    function updatePreview() {
        if (!resumeData) return;
        
        // Update local resumeData with personal info from inputs
        resumeData.personalInfo = {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            location: document.getElementById('location').value,
            summary: document.getElementById('summary').value
        };

        const previewContainer = document.getElementById('resume-preview');
        // We use the resumeData.templateId or fall back to modern-tech
        renderResumeTemplate(previewContainer, resumeData, resumeData.templateId || 'modern-tech');
    }

    function setPreviewSize(mode) {
        const preview = document.getElementById('resume-preview');
        const desktopBtn = document.getElementById('desktop-toggle');
        const mobileBtn = document.getElementById('mobile-toggle');

        if (mode === 'mobile') {
            preview.style.width = '375px'; // iPhone width
            preview.style.minHeight = '667px';
            preview.classList.remove('shadow-2xl');
            preview.classList.add('shadow-xl', 'rounded-[40px]', 'border-[12px]', 'border-slate-900');
            
            mobileBtn.classList.add('bg-white', 'dark:bg-gray-800', 'text-primary', 'dark:text-indigo-400', 'shadow-sm');
            desktopBtn.classList.remove('bg-white', 'dark:bg-gray-800', 'text-primary', 'dark:text-indigo-400', 'shadow-sm');
            desktopBtn.classList.add('text-on-surface-variant', 'dark:text-gray-400');
        } else {
            preview.style.width = '210mm'; // A4 width
            preview.style.minHeight = '297mm';
            preview.classList.add('shadow-2xl');
            preview.classList.remove('rounded-[40px]', 'border-[12px]', 'border-slate-900');
            
            desktopBtn.classList.add('bg-white', 'dark:bg-gray-800', 'text-primary', 'dark:text-indigo-400', 'shadow-sm');
            mobileBtn.classList.remove('bg-white', 'dark:bg-gray-800', 'text-primary', 'dark:text-indigo-400', 'shadow-sm');
            mobileBtn.classList.add('text-on-surface-variant', 'dark:text-gray-400');
        }
    }

    async function saveResume() {
        if (!resumeId) return;

        const btn = document.getElementById('save-draft-btn');
        const btnText = document.getElementById('save-btn-text');
        
        try {
            btnText.innerText = 'Saving...';
            btn.disabled = true;

            // resumeData is kept up to date by handleFieldChange
            await fetchAPI(`/resumes/${resumeId}`, {
                method: 'PUT',
                body: JSON.stringify(resumeData)
            });

            btnText.innerText = 'Saved';
            btn.classList.replace('bg-primary-container', 'bg-green-600');
            
            setTimeout(() => {
                btnText.innerText = 'Save Draft';
                btn.classList.replace('bg-green-600', 'bg-primary-container');
                btn.disabled = false;
            }, 3000);

        } catch (error) {
            console.error('Error saving resume:', error);
            btnText.innerText = 'Error';
            btn.classList.replace('bg-primary-container', 'bg-red-600');
            setTimeout(() => {
                btnText.innerText = 'Save Draft';
                btn.classList.replace('bg-red-600', 'bg-primary-container');
                btn.disabled = false;
            }, 3000);
        }
    }

    async function handleNextStep() {
        try {
            await saveResume();
            window.location.href = `preview.html?id=${resumeId}`;
        } catch (error) {
            alert('Failed to save resume before proceeding: ' + error.message);
        }
    }
</script>
</html>

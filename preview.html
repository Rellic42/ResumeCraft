    </button>

    <button onclick="handleZoom(0.1)" class="p-2 hover:bg-white dark:hover:bg-gray-700 rounded-md transition-all">
        <span class="material-symbols-outlined text-body-md dark:text-gray-300">zoom_in</span>

<script>
    let currentResume = null;

    document.addEventListener('DOMContentLoaded', async () => {
        if (!checkAuth()) return;
        const urlParams = new URLSearchParams(window.location.search);
        const resumeId = urlParams.get('id');

        if (!resumeId) {
            alert('No resume ID provided.');
            window.location.href = 'dashboard.html';
            return;
        }

        try {
            currentResume = await fetchAPI('/resumes/' + resumeId);
            renderResume(currentResume);
        } catch (error) {
            console.error('Error fetching resume:', error);
            alert('Error fetching resume details: ' + error.message);
        }
    });

    async function downloadPDF() {
        const element = document.getElementById('resume-container');
        const btn = document.getElementById('download-btn');
        const urlParams = new URLSearchParams(window.location.search);
        const resumeId = urlParams.get('id');

        if (!element) return;

        try {
            btn.innerText = 'Generating PDF...';
            btn.disabled = true;

            const opt = {
                margin: 0,
                filename: `${currentResume?.personalInfo?.fullName || 'Resume'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            await html2pdf().set(opt).from(element).save();
            
            // Record download in backend (optional tracking, shouldn't block success)
            try {
                await fetchAPI(`/resumes/${resumeId}/download`, { method: 'POST' });
            } catch (trackErr) {
                console.warn('Analytics tracking failed:', trackErr);
            }

            btn.innerHTML = '<span class="material-symbols-outlined text-body-md" style="font-variation-settings: \'FILL\' 1;">check_circle</span> Downloaded';
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-body-md" style="font-variation-settings: \'FILL\' 1;">download</span> Download PDF';
                btn.disabled = false;
            }, 3000);

        } catch (error) {
            console.error('PDF Generation Error:', error);
            alert('Failed to generate PDF. Please try again.');
            btn.innerText = 'Download PDF';
            btn.disabled = false;
        }
    }

    let currentZoom = 1.0;

    function handleZoom(delta) {
        currentZoom = Math.min(Math.max(currentZoom + delta, 0.5), 1.5);
        const container = document.getElementById('resume-container');
        const zoomText = document.getElementById('zoom-level');
        
        container.style.transform = `scale(${currentZoom})`;
        zoomText.innerText = `${Math.round(currentZoom * 100)}%`;
        
        // Adjust parent padding to account for scaled height if needed
        // but origin-top usually keeps it manageable
    }

    function renderResume(resume) {
        const container = document.getElementById('resume-container');
        renderResumeTemplate(container, resume, resume.templateId || 'modern-tech');
    }
</script>

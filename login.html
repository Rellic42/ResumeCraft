<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

                    "colors": {
                        "surface-container": "#f0ecf9",

                        "on-error": "#ffffff",
                        "primary-container": "#4f46e5",
                        "surface-tint": "#4d44e3",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface": "#fcf8ff",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "surface-container-low": "#f5f2ff",
                        "surface-container-highest": "#e4e1ee",
                        "secondary-fixed-dim": "#c0c1ff",
                        "on-surface-variant": "#464555",
                        "surface-bright": "#fcf8ff",
                        "primary": "#3525cd",
                        "on-primary": "#ffffff",
                        "background": "#fcf8ff",
                        "on-primary-fixed": "#0f0069",
                        "on-primary-container": "#dad7ff",
                        "inverse-on-surface": "#f3effc",
                        "on-secondary-fixed": "#07006c",
                        "on-tertiary-fixed": "#351000",
                        "surface-container-high": "#eae6f4",
                        "on-background": "#1b1b24",
                        "secondary-fixed": "#e1e0ff",
                        "secondary": "#4648d4",
                        "on-secondary-container": "#fffbff",
                        "surface-variant": "#e4e1ee",
                        "tertiary-fixed": "#ffdbcc",
                        "outline": "#777587",
                        "surface-dim": "#dcd8e5",
                        "secondary-container": "#6063ee",
                        "inverse-surface": "#302f39",
                        "inverse-primary": "#c3c0ff",
                        "primary-fixed": "#e2dfff",
                        "tertiary-fixed-dim": "#ffb695",
                        "outline-variant": "#c7c4d8",
                        "primary-fixed-dim": "#c3c0ff",
                        "tertiary": "#7e3000",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3323cc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-content-width": "1280px",
                        "2xl": "48px",
                        "md": "16px",
                        "xl": "32px",
                        "sidebar-width": "280px",
                        "base": "8px",
                        "xs": "4px",
                        "lg": "24px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "display": ["Inter"],
                        "h2": ["Inter"],
                        "h1": ["Inter"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "h3": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", {"lineHeight": "1", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "600"}],
                        "display": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h2": ["24px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h1": ["30px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "h3": ["20px", {"lineHeight": "1.5", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
</head>
<body class="bg-surface dark:bg-gray-950 font-body-md text-on-surface dark:text-gray-100 antialiased min-h-screen flex flex-col transition-colors duration-300">
<!-- Auth Layout Wrapper -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Abstract Background Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full -z-10 opacity-30">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container blur-[120px] rounded-full opacity-20"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container blur-[120px] rounded-full opacity-20"></div>
</div>
<!-- Login Card Container -->
<div class="w-full max-w-md">
<!-- Branding Area -->
<div class="text-center mb-xl">
<div class="inline-flex items-center gap-2 mb-md">
<span class="material-symbols-outlined text-primary-container text-[40px]" data-icon="description">description</span>
<a href="index.html" class="font-display text-display text-primary-container cursor-pointer">ResumeCraft</a>
</div>
<h1 class="font-h1 text-h1 text-on-surface dark:text-white">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant dark:text-gray-400 mt-xs">Build your future with precision.</p>
</div>
<!-- Main Form Card -->
<div class="bg-surface-container-lowest dark:bg-gray-900 border border-outline-variant dark:border-gray-800 rounded-xl p-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<form id="auth-form" class="space-y-lg">
<!-- Name Field (Hidden for Login) -->
<div id="name-field-container" class="space-y-xs hidden">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200" for="name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline dark:text-gray-500">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</div>
<input class="w-full pl-11 pr-md py-3 bg-surface dark:bg-gray-800 border border-outline-variant dark:border-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all placeholder:text-outline-variant font-body-md" id="name" name="name" placeholder="Alex Carter" type="text"/>
</div>
</div>
<!-- Role Selection (Hidden for Login) -->
<div id="role-field-container" class="space-y-xs hidden">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200" for="role">I am a...</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline dark:text-gray-500">
<span class="material-symbols-outlined text-[20px]" data-icon="badge">badge</span>
</div>
<select class="w-full pl-11 pr-md py-3 bg-surface dark:bg-gray-800 border border-outline-variant dark:border-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all font-body-md appearance-none" id="role" name="role">
<option value="jobseeker">Jobseeker</option>
<option value="recruiter">Recruiter</option>
<option value="coach">Job Coach</option>
</select>
<div class="absolute inset-y-0 right-0 pr-md flex items-center pointer-events-none text-outline dark:text-gray-500">
<span class="material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200" for="email">Email address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline dark:text-gray-500">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-11 pr-md py-3 bg-surface dark:bg-gray-800 border border-outline-variant dark:border-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all placeholder:text-outline-variant font-body-md" id="email" name="email" placeholder="alex@resumecraft.com" type="email"/>
</div>
<p class="hidden text-error font-label-sm text-label-sm mt-1">Please enter a valid email address.</p>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface dark:text-gray-200" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary dark:text-indigo-400 hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline dark:text-gray-500">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-11 py-3 bg-surface dark:bg-gray-800 border border-outline-variant dark:border-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all placeholder:text-outline-variant font-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button id="toggle-password" class="absolute inset-y-0 right-0 pr-md flex items-center text-outline dark:text-gray-500 hover:text-primary dark:hover:text-indigo-400 transition-colors" type="button">
<span id="toggle-password-icon" class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary-container border-outline-variant dark:border-gray-700 rounded focus:ring-primary-container focus:ring-offset-0 bg-white dark:bg-gray-800" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 font-label-md text-label-md text-on-surface-variant dark:text-gray-400 cursor-pointer select-none" for="remember-me">Remember me</label>
</div>
<!-- Actions -->
<div class="pt-2">
<p id="error-msg" class="text-error font-label-sm text-center hidden mb-2"></p>
<button id="submit-btn" class="w-full py-3 px-md bg-primary-container hover:bg-secondary-container text-on-primary font-label-md text-label-md rounded-lg shadow-sm transition-all flex justify-center items-center gap-2 group active:scale-[0.98]" type="submit">
                            Sign In
                            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>

</form>
</div>
<!-- Secondary Link -->
<p class="text-center mt-xl font-body-sm text-body-sm text-on-surface-variant dark:text-gray-400">
                <span id="toggle-text">Don't have an account?</span> 
                <a id="toggle-btn" class="font-label-sm text-label-sm text-primary dark:text-indigo-400 font-bold hover:cursor-pointer hover:underline ml-1" onclick="toggleAuthMode()">Sign up</a>
</p>
</div>
</main>
<!-- Simplified Footer for Login Context -->
<footer class="py-lg px-xl">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<span class="font-body-sm text-body-sm text-outline">© 2024 ResumeCraft Inc. All rights reserved.</span>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Contact Us</a>
</div>
</div>
</footer>
<script>
    let isLogin = true;

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signup') === 'true') {
            toggleAuthMode();
        }
    });

    function toggleAuthMode() {
        isLogin = !isLogin;
        const nameField = document.getElementById('name-field-container');
        const roleField = document.getElementById('role-field-container');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const toggleBtn = document.getElementById('toggle-btn');
        const title = document.querySelector('h1');

        if (isLogin) {
            nameField.classList.add('hidden');
            roleField.classList.add('hidden');
            submitBtn.innerHTML = `Sign In <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>`;
            toggleText.innerText = "Don't have an account?";
            toggleBtn.innerText = "Sign up";
            title.innerText = "Welcome back";
        } else {
            nameField.classList.remove('hidden');
            roleField.classList.remove('hidden');
            submitBtn.innerHTML = `Sign Up <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>`;
            toggleText.innerText = "Already have an account?";
            toggleBtn.innerText = "Sign in";
            title.innerText = "Create an account";
        }
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.classList.add('hidden');

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;

        if (!isLogin && !name.trim()) {
            errorMsg.innerText = "Please enter your Full Name.";
            errorMsg.classList.remove('hidden');
            return;
        }

        try {
            const endpoint = isLogin ? '/auth/login' : '/auth/register';
            const body = isLogin ? { email, password } : { name, email, password, role };

            const data = await fetchAPI(endpoint, {
                method: 'POST',
                body: JSON.stringify(body)
            });

            // Save token and user info
            localStorage.setItem('resumeCraftToken', data.token);
            localStorage.setItem('resumeCraftUser', JSON.stringify({
                _id: data._id,
                name: data.name,
                email: data.email,
                role: data.role
            }));

            // Redirect based on role
            if (data.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } catch (error) {
            errorMsg.innerText = error.message;
            errorMsg.classList.remove('hidden');
        }
    });

    document.getElementById('toggle-password').addEventListener('click', () => {
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('toggle-password-icon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.innerText = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            icon.innerText = 'visibility';
        }
    });
</script>
</body></html>
